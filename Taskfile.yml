version: '3'

# Docs — Almena Network documentation (Docusaurus)
# Run: task (lists options) or task <name>

vars:
  PKG_MGR: pnpm

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install dependencies
    cmds:
      - echo "Installing docs dependencies (pnpm)..."
      - "{{.PKG_MGR}} install"

  build:
    desc: Build static site
    cmds:
      - echo "Building docs static site (Docusaurus)..."
      - "{{.PKG_MGR}} run build"

  serve:
    desc: Serve built site locally (port 3001)
    cmds:
      - echo "Serving docs site locally (port 3001)..."
      - "{{.PKG_MGR}} run serve"

  clean:
    desc: Remove build artifacts and cache
    cmds:
      - echo "Cleaning docs build artifacts and cache..."
      - "{{.PKG_MGR}} run clear"
