version: '3'
silent: true

# Docusaurus site: `dir` + `pnpm --dir` keep tooling rooted in `docs/` so `.env` (if present)
# resolves from this directory. Task does not support `dotenv:` in included Taskfiles.

vars:
  PKG_MGR: pnpm

tasks:
  default:
    desc: List available tasks
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - echo "[docs] list tasks"
      - task --list

  install:
    desc: Install dependencies
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - echo "[docs] pnpm install"
      - |
        if {{.PKG_MGR}} --dir "{{.TASKFILE_DIR}}" install --frozen-lockfile; then
          echo "[docs] lockfile already satisfied"
        else
          {{.PKG_MGR}} --dir "{{.TASKFILE_DIR}}" install
        fi

  dev:
    desc: Start Docusaurus dev server on port 3001
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - echo "[docs] Docusaurus dev (port 3001)"
      - '{{.PKG_MGR}} --dir "{{.TASKFILE_DIR}}" run start'

  build:
    desc: Build static site
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - echo "[docs] Docusaurus build"
      - '{{.PKG_MGR}} --dir "{{.TASKFILE_DIR}}" run build'

  serve:
    desc: Serve built site locally (port 3001)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - echo "[docs] Docusaurus serve preview"
      - '{{.PKG_MGR}} --dir "{{.TASKFILE_DIR}}" run serve'

  clean:
    desc: Remove build artifacts, Docusaurus cache, and node_modules
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - echo "[docs] clean build output and node_modules"
      - '[ ! -d node_modules ] || {{.PKG_MGR}} --dir "{{.TASKFILE_DIR}}" run clear'
      - rm -rf node_modules

  clean:all:
    desc: Run clean and remove local .env
    dir: "{{.TASKFILE_DIR}}"
    deps: [clean]
    cmds:
      - echo "[docs] remove .env if present"
      - rm -f .env
