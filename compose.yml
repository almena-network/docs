# Almena ID - Docusaurus Documentation
# Standalone compose file for the docs module

services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: almena-docs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    profiles:
      - docs
    ports:
      - "${DOCS_PORT:-3001}:3001"
    networks:
      - almena-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  almena-network:
    driver: bridge
